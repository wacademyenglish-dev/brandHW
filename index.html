<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wolfflix Homework - Spider-Man: Brand New Day</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Production) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animations */
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0;} 100% { transform: scale(1); opacity: 1;} }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        
        .animate-slideIn { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out forwards; }

        /* Hide scrollbar for mobile feel */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="text-white flex justify-center items-center min-h-[100dvh]">

    <div id="root" class="w-full h-full max-w-md bg-[#0a0a0c] relative overflow-hidden sm:h-[850px] sm:rounded-[40px] sm:border-8 sm:border-[#1a1a1f] sm:shadow-2xl flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONSTANTS ---
        const YOUTUBE_ID = "8TZMtslA3UY";

        // --- COMPONENTS ---
        const Icon = ({ name, size = 20, className = "" }) => (
            <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        // --- DATA: 15 EXERCISES ---
        const QUESTIONS = [
            {
                id: 1,
                type: "vocab",
                question: "What is an 'alter ego'?",
                options: [
                    "A terrible mistake made by a hero.",
                    "A secondary or secret personality.",
                    "A powerful weapon.",
                    "The main villain of a story."
                ],
                correct: 1,
                explanation: "An alter ego is a second self, which is distinct from a person's normal or true original personality (like Peter Parker and Spider-Man)."
            },
            {
                id: 2,
                type: "phrasal verbs",
                question: "If you decide to stop trying to do something, you...",
                options: [
                    "Give up",
                    "Take over",
                    "Find out",
                    "Figure out"
                ],
                correct: 0,
                explanation: "To 'give up' means to surrender or quit trying."
            },
            {
                id: 3,
                type: "grammar",
                question: "Which tense do we use to talk about imaginary, hypothetical situations?",
                options: [
                    "Present Simple",
                    "First Conditional",
                    "Second Conditional",
                    "Past Continuous"
                ],
                correct: 2,
                explanation: "The Second Conditional is used to imagine situations that are not true in the present reality."
            },
            {
                id: 4,
                type: "grammar",
                question: "Complete the Second Conditional sentence: 'If I _____ powers, I would save the city.'",
                options: [
                    "have",
                    "will have",
                    "having",
                    "had"
                ],
                correct: 3,
                explanation: "The structure is: If + Past Simple (had), ... would + Base Verb (save)."
            },
            {
                id: 5,
                type: "phrasal verbs",
                question: "If a villain wants to control the city, they want to...",
                options: [
                    "Take over the city",
                    "Give up the city",
                    "Figure out the city",
                    "Find out the city"
                ],
                correct: 0,
                explanation: "'Take over' means to assume control of something."
            },
            {
                id: 6,
                type: "expression",
                question: "What does 'no matter how hard' mean?",
                options: [
                    "It is very physically hard to do.",
                    "Regardless of the amount of effort I put in.",
                    "It doesn't matter, it's easy.",
                    "I don't want to try hard."
                ],
                correct: 1,
                explanation: "We use 'no matter how hard' to express frustration when we try a lot, but the result doesn't change."
            },
            {
                id: 7,
                type: "grammar",
                question: "What is the grammatically correct way to state a present reality fact?",
                options: [
                    "I doesn't have powers.",
                    "I don't have powers.",
                    "I not have powers.",
                    "I am not having powers."
                ],
                correct: 1,
                explanation: "We use the Present Simple (I don't have) to talk about brutal reality and facts."
            },
            {
                id: 8,
                type: "grammar",
                question: "Complete the sentence: 'If they knew my secret, they _____ in danger.'",
                options: [
                    "would be",
                    "will be",
                    "are",
                    "were"
                ],
                correct: 0,
                explanation: "Second Conditional result clause: would + base verb (be)."
            },
            {
                id: 9,
                type: "phrasal verbs",
                question: "To solve a problem or understand something confusing is to...",
                options: [
                    "Take over",
                    "Give up",
                    "Figure out",
                    "Give out"
                ],
                correct: 2,
                explanation: "'Figure out' means to find a solution or understand the truth."
            },
            {
                id: 10,
                type: "grammar",
                question: "Complete the sentence: 'We _____ know each other.'",
                options: [
                    "used to",
                    "using to",
                    "use to",
                    "are used to"
                ],
                correct: 0,
                explanation: "'Used to' describes a past reality or habit that is completely finished now."
            },
            {
                id: 11,
                type: "grammar",
                question: "Why is 'You aren't remembering me' incorrect in standard English?",
                options: [
                    "Because 'remember' is a State Verb and usually doesn't take the Continuous (ing) form.",
                    "Because it should be 'You don't remembering me'.",
                    "Because it refers to the future.",
                    "It is actually correct."
                ],
                correct: 0,
                explanation: "Verbs related to the mind (remember, know, believe) are State Verbs and use Present Simple: 'You don't remember me'."
            },
            {
                id: 12,
                type: "expression",
                question: "To 'break someone's heart' means to...",
                options: [
                    "Physically attack them.",
                    "Cause them deep emotional pain.",
                    "Help them during a hard time.",
                    "Tell them a secret."
                ],
                correct: 1,
                explanation: "It's an idiom used when you cause intense sadness or grief to someone you love."
            },
            {
                id: 13,
                type: "grammar",
                question: "In the phrase 'to make everyone forget', what is the role of 'make'?",
                options: [
                    "To build or create an object.",
                    "To force or cause an action to happen.",
                    "To suggest an idea.",
                    "To forget a memory."
                ],
                correct: 1,
                explanation: "This is the Causative Make. It means forcing or causing someone to do something."
            },
            {
                id: 14,
                type: "context",
                question: "What is Peter Parker's main internal conflict in the trailer?",
                options: [
                    "Choosing between Mary Jane and Gwen Stacy.",
                    "Deciding whether to take over the city.",
                    "Choosing between his personal life/family and his responsibility to save people.",
                    "Figuring out how to build a better suit."
                ],
                correct: 2,
                explanation: "His burden is that being Spider-Man puts his loved ones in danger, forcing him to keep secrets."
            },
            {
                id: 15,
                type: "grammar",
                question: "Complete the advanced sentence: 'I _____ give up if I _____ you.'",
                options: [
                    "will not / was",
                    "would not / were",
                    "am not / am",
                    "don't / were"
                ],
                correct: 1,
                explanation: "Second Conditional: would + base verb (would not give up) / if + past simple (were)."
            }
        ];

        // --- MAIN APP COMPONENT ---
        function App() {
            const [step, setStep] = useState('start'); // 'start', 'quiz', 'result'
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [showExplanation, setShowExplanation] = useState(false);

            const startQuiz = () => {
                setStep('quiz');
                setCurrentQ(0);
                setScore(0);
            };

            const handleOptionClick = (index) => {
                if (selectedOpt !== null) return; // Prevent double clicking
                setSelectedOpt(index);
                setShowExplanation(true);

                if (index === QUESTIONS[currentQ].correct) {
                    setScore(s => s + 1);
                }
            };

            const handleNext = () => {
                if (currentQ < QUESTIONS.length - 1) {
                    setCurrentQ(q => q + 1);
                    setSelectedOpt(null);
                    setShowExplanation(false);
                } else {
                    setStep('result');
                }
            };

            // Calculate progress percentage
            const progress = ((currentQ) / QUESTIONS.length) * 100;

            // --- VIEWS ---

            if (step === 'start') {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-6 text-center bg-gradient-to-b from-[#0a0a0c] to-[#050505] animate-pop relative">
                        <div className="w-16 h-16 bg-blue-600 text-white font-black text-4xl flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.5)] mb-8">W</div>
                        <h1 className="text-3xl font-black mb-2 uppercase tracking-tight">Student Mission</h1>
                        <h2 className="text-xl text-blue-500 font-bold mb-8 uppercase tracking-widest">Brand New Day (B1)</h2>
                        
                        <div className="bg-[#1a1a1f] border border-white/10 rounded-2xl p-6 mb-10 w-full max-w-sm">
                            <ul className="text-left text-gray-300 space-y-4 font-medium">
                                <li className="flex items-center gap-3"><Icon name="check-circle" className="text-emerald-500"/> 15 Quick Challenges</li>
                                <li className="flex items-center gap-3"><Icon name="bolt" className="text-blue-500"/> Second Conditional Focus</li>
                                <li className="flex items-center gap-3"><Icon name="play" className="text-red-500"/> Scene Review at the end</li>
                            </ul>
                        </div>

                        <button 
                            onClick={startQuiz}
                            className="w-full max-w-sm bg-blue-600 hover:bg-blue-700 text-white font-bold text-xl py-4 rounded-xl shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-transform active:scale-95 uppercase tracking-widest"
                        >
                            Start Mission
                        </button>
                    </div>
                );
            }

            if (step === 'result') {
                const percentage = Math.round((score / QUESTIONS.length) * 100);
                let message = "";
                if (percentage >= 90) message = "HERO LEVEL! 🌟";
                else if (percentage >= 70) message = "GREAT JOB! 🕷️";
                else if (percentage >= 50) message = "GOOD EFFORT! 👍";
                else message = "DON'T GIVE UP! 💪";

                return (
                    <div className="flex flex-col h-full bg-[#050505] animate-slideIn">
                        <div className="flex-1 overflow-y-auto p-6 flex flex-col items-center pb-12 custom-scrollbar">
                            
                            <Icon name="trophy" size={64} className="text-yellow-400 mt-8 mb-4 drop-shadow-[0_0_20px_rgba(250,204,21,0.5)]" />
                            <h1 className="text-3xl font-black mb-1 uppercase tracking-tight text-center">{message}</h1>
                            <p className="text-gray-400 font-medium mb-8">Mission Complete</p>

                            <div className="bg-[#0a0a0c] border border-white/10 rounded-3xl p-8 w-full max-w-sm text-center mb-8 shadow-2xl">
                                <p className="text-sm text-gray-500 font-bold uppercase tracking-widest mb-2">Final Score</p>
                                <div className="text-6xl font-black text-white mb-2">{score} <span className="text-2xl text-gray-500">/ {QUESTIONS.length}</span></div>
                                <p className="text-emerald-400 font-bold">{percentage}% Accuracy</p>
                            </div>

                            <div className="w-full max-w-sm">
                                <h3 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="clapperboard" className="text-red-500"/> Watch the Scene</h3>
                                <div className="w-full aspect-video bg-black rounded-xl overflow-hidden border border-white/10 shadow-lg">
                                    <iframe 
                                        className="w-full h-full" 
                                        src={`https://www.youtube.com/embed/${YOUTUBE_ID}?rel=0&modestbranding=1`} 
                                        frameBorder="0" 
                                        allowFullScreen>
                                    </iframe>
                                </div>
                            </div>
                            
                            <button 
                                onClick={() => setStep('start')}
                                className="w-full max-w-sm bg-[#1a1a1f] hover:bg-[#2a2a30] text-white font-bold py-4 rounded-xl mt-8 transition-transform active:scale-95"
                            >
                                Back to Start
                            </button>
                        </div>
                    </div>
                );
            }

            // --- QUIZ VIEW ---
            const question = QUESTIONS[currentQ];

            return (
                <div className="flex flex-col h-full bg-[#050505] relative">
                    {/* Top Progress Bar */}
                    <div className="w-full h-2 bg-[#1f1f1f]">
                        <div 
                            className="h-full bg-blue-600 transition-all duration-500 shadow-[0_0_10px_rgba(37,99,235,0.8)]"
                            style={{ width: `${progress}%` }}
                        ></div>
                    </div>

                    {/* Header */}
                    <div className="flex justify-between items-center p-4 border-b border-white/5">
                        <div className="text-gray-500 font-bold text-sm tracking-widest">Q {currentQ + 1} OF {QUESTIONS.length}</div>
                        <div className="bg-[#0a0a0c] border border-white/10 px-3 py-1 rounded-full flex items-center gap-2">
                            <Icon name="star" size={12} className="text-yellow-500"/>
                            <span className="text-white font-bold text-sm">{score}</span>
                        </div>
                    </div>

                    {/* Question Area */}
                    <div key={currentQ} className="flex-1 p-6 flex flex-col overflow-y-auto animate-slideIn custom-scrollbar">
                        <span className="text-blue-500 text-xs font-bold uppercase tracking-widest mb-2 flex items-center gap-1">
                            <Icon name={question.type === 'vocab' || question.type === 'expression' || question.type === 'phrasal verbs' ? 'book' : question.type === 'grammar' ? 'crosshairs' : 'comment'} size={12} />
                            {question.type} Check
                        </span>
                        <h2 className="text-2xl md:text-3xl font-black leading-tight mb-8">
                            {question.question}
                        </h2>

                        <div className="flex flex-col gap-3 w-full mt-auto mb-8">
                            {question.options.map((opt, i) => {
                                const isSelected = selectedOpt === i;
                                const isCorrectAnswer = i === question.correct;
                                
                                let btnStyle = "bg-[#1a1a1f] border-white/5 hover:border-white/20 text-gray-200";
                                
                                if (showExplanation) {
                                    if (isCorrectAnswer) {
                                        btnStyle = "bg-green-600/20 border-green-500 text-green-400";
                                    } else if (isSelected && !isCorrectAnswer) {
                                        btnStyle = "bg-red-600/20 border-red-500 text-red-500 animate-shake";
                                    } else {
                                        btnStyle = "opacity-40 bg-[#1a1a1f] border-transparent text-gray-500";
                                    }
                                }

                                return (
                                    <button 
                                        key={i}
                                        onClick={() => handleOptionClick(i)}
                                        className={`w-full text-left p-5 rounded-xl border-2 font-bold text-[15px] sm:text-lg transition-all duration-300 active:scale-[0.98] flex items-center justify-between ${btnStyle}`}
                                    >
                                        <span>{opt}</span>
                                        {showExplanation && isCorrectAnswer && <Icon name="check" size={18} />}
                                        {showExplanation && isSelected && !isCorrectAnswer && <Icon name="xmark" size={18} />}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Explanation Box */}
                        <div className={`transition-all duration-500 overflow-hidden ${showExplanation ? 'max-h-48 opacity-100 mb-6' : 'max-h-0 opacity-0'}`}>
                            <div className="bg-[#0a0a0c] border border-blue-500/30 border-l-4 border-l-blue-500 rounded-lg p-4">
                                <p className="text-blue-400 text-xs uppercase font-bold tracking-widest mb-1">Explanation</p>
                                <p className="text-gray-300 text-sm font-medium">{question.explanation}</p>
                            </div>
                        </div>

                        {/* Next Button */}
                        {showExplanation && (
                            <button 
                                onClick={handleNext}
                                className="w-full bg-white text-black font-black text-lg py-4 rounded-xl mt-auto shadow-lg active:scale-95 transition-transform uppercase tracking-wider animate-pop"
                            >
                                {currentQ === QUESTIONS.length - 1 ? 'Finish Mission' : 'Next Question'}
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        // --- RENDER APP ---
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
